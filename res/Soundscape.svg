<svg xmlns="http://www.w3.org/2000/svg" width="142.24mm" height="130mm" viewBox="0 0 142.24 130">
  <rect x="0" y="0" width="142.24" height="130" fill="#1c1c1e"/>

  <!-- Title -->
  <text x="71.12" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#f0f0f0">SOUNDSCAPE</text>
  <text x="71.12" y="11.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="3" fill="#9a9a9a">8 CHANNEL CV SEQUENCER</text>

  <line x1="4" y1="15" x2="138.24" y2="15" stroke="#444" stroke-width="0.3"/>

  <!-- Top control cluster labels -->
  <text x="10" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.6" fill="#c8c8c8">CLK/CV</text>
  <text x="22" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.6" fill="#c8c8c8">RST/HLD</text>
  <text x="34" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.6" fill="#c8c8c8">MODE</text>
  <text x="34" y="36.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.1" fill="#7d8fa3">INT EXT MOD</text>
  <text x="50" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.6" fill="#c8c8c8">SYNC</text>
  <text x="64" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.6" fill="#c8c8c8">OFFSET</text>
  <text x="78" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.6" fill="#c8c8c8">RHYTHM</text>

  <line x1="42" y1="17" x2="42" y2="35" stroke="#444" stroke-width="0.25"/>
  <line x1="86" y1="17" x2="86" y2="35" stroke="#444" stroke-width="0.25"/>

  <line x1="4" y1="38" x2="138.24" y2="38" stroke="#444" stroke-width="0.3"/>

  <!-- Channel columns -->
  <g font-family="Arial, sans-serif">
    <text x="14"  y="42.5" text-anchor="middle" font-size="3" fill="#888">1</text>
    <text x="30"  y="42.5" text-anchor="middle" font-size="3" fill="#888">2</text>
    <text x="46"  y="42.5" text-anchor="middle" font-size="3" fill="#888">3</text>
    <text x="62"  y="42.5" text-anchor="middle" font-size="3" fill="#888">4</text>
    <text x="78"  y="42.5" text-anchor="middle" font-size="3" fill="#888">5</text>
    <text x="94"  y="42.5" text-anchor="middle" font-size="3" fill="#888">6</text>
    <text x="110" y="42.5" text-anchor="middle" font-size="3" fill="#888">7</text>
    <text x="126" y="42.5" text-anchor="middle" font-size="3" fill="#888">8</text>
  </g>

  <!-- Section dividers below the fader/display/output stack -->
  <line x1="4" y1="113" x2="138.24" y2="113" stroke="#444" stroke-width="0.3"/>

  <!-- Bottom perform-button labels -->
  <g font-family="Arial, sans-serif" font-size="2.3" fill="#9a9a9a" text-anchor="middle">
    <text x="14"  y="123">CLEAR</text>
    <text x="30"  y="123">SMOOTH</text>
    <text x="46"  y="123">RND</text>
    <text x="62"  y="123">FREEZE</text>
    <text x="78"  y="123">FWD</text>
    <text x="94"  y="123">REV</text>
    <text x="110" y="123">PEND</text>
    <text x="126" y="123">RNDSEQ</text>
  </g>

  <text x="71.12" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.4" fill="#5a5a5a">PERFORM</text>
</svg>
