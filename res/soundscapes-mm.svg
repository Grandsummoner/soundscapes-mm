<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 380" width="420" height="380">
  <defs>
    <!-- Smoked amber glass gradient for recessed 7-segment displays -->
    <linearGradient id="displayGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#160d07" />
      <stop offset="100%" stop-color="#24160d" />
    </linearGradient>
    
    <!-- Soft vintage drop shadow for 3D elements -->
    <filter id="shadowFilter" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.75" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ================================================================= -->
  <!-- 1. CHASSIS AND PANEL LAYOUT                                       -->
  <!-- ========================================================================== -->
  <!-- Main Chassis Backplate: Warm vintage antique cream -->
  <rect x="0" y="0" width="420" height="380" fill="#f4eed6" stroke="#2a1f18" stroke-width="1.5" />

  <!-- Left Input Column: Contrasting warm sand tone -->
  <rect x="0" y="0" width="45" height="380" fill="#e2d8b8" />
  <line x1="45" y1="0" x2="45" y2="380" stroke="#362a21" stroke-width="1.25" />

  <!-- Right Sidebar Column: Contrasting sand tone with vintage frame boundaries -->
  <rect x="375" y="0" width="45" height="380" fill="#e4daba" />
  <line x1="375" y1="0" x2="375" y2="380" stroke="#362a21" stroke-width="1.25" />

  <!-- Outer aesthetic borders -->
  <rect x="4" y="4" width="412" height="372" fill="none" stroke="#362a21" stroke-width="0.5" stroke-dasharray="10,2,2,2" />

  <!-- ========================================== -->
  <!-- 2. BRANDING AND HEADER GRAPHICS            -->
  <!-- ========================================== -->
  <!-- Main Styled Logo (Antiqued typography layout) -->
  <text x="210" y="30" font-family="sans-serif" font-weight="900" font-size="18" fill="#362a21" letter-spacing="5" text-anchor="middle">S O U N D S C A P E S</text>
  <line x1="60" y1="38" x2="360" y2="42" stroke="#362a21" stroke-width="0.75" />

  <!-- ========================================== -->
  <!-- 3. INPUT COLUMN MARKINGS (LEFT SIDE)       -->
  <!-- ========================================== -->
  <text x="22.5" y="22" font-family="sans-serif" font-weight="bold" font-size="9" fill="#362a21" text-anchor="middle" letter-spacing="1">IN</text>

  <!-- CLK Input Jack -->
  <circle cx="22.5" cy="55" r="13" fill="#dfd4b4" stroke="#362a21" stroke-width="1" />
  <text x="22.5" y="74" font-family="sans-serif" font-weight="bold" font-size="7.5" fill="#362a21" text-anchor="middle">CLK</text>

  <!-- RST Input Jack -->
  <circle cx="22.5" cy="95" r="13" fill="none" stroke="#362a21" stroke-width="0.75" />
  <text x="22.5" y="114" font-family="sans-serif" font-weight="bold" font-size="7.5" fill="#362a21" text-anchor="middle">RST</text>

  <!-- V/OCT Input Jack -->
  <circle cx="22.5" cy="135" r="13" fill="none" stroke="#362a21" stroke-width="0.75" />
  <text x="22.5" y="154" font-family="sans-serif" font-weight="bold" font-size="7.5" fill="#362a21" text-anchor="middle">V/OCT</text>

  <!-- GATE Input Jack -->
  <circle cx="22.5" cy="175" r="13" fill="none" stroke="#362a21" stroke-width="0.75" />
  <text x="22.5" y="194" font-family="sans-serif" font-weight="bold" font-size="7" fill="#362a21" text-anchor="middle">GATE</text>

  <!-- VEL Input Jack -->
  <circle cx="22.5" cy="215" r="13" fill="none" stroke="#362a21" stroke-width="0.75" />
  <text x="22.5" y="234" font-family="sans-serif" font-weight="bold" font-size="7" fill="#362a21" text-anchor="middle">VEL</text>

  <!-- EXT IN Jack (Slightly oversized highlighted ring) -->
  <circle cx="22.5" cy="265" r="15" fill="none" stroke="#ffbf00" stroke-width="1.25" />
  <text x="22.5" y="286" font-family="sans-serif" font-weight="bold" font-size="7.5" fill="#362a21" text-anchor="middle">EXT IN</text>

  <!-- DUCK Jack (Slightly oversized highlight ring) -->
  <circle cx="22.5" cy="315" r="14" fill="none" stroke="#ff3b30" stroke-width="1.25" />
