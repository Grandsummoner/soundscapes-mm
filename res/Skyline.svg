  <circle cx="278" cy="22"  r="12" fill="#c8c5be" stroke="#aaa" stroke-width="2"/>
  <circle cx="22"  cy="358" r="12" fill="#c8c5be" stroke="#aaa" stroke-width="2"/>
  <circle cx="278" cy="358" r="12" fill="#c8c5be" stroke="#aaa" stroke-width="2"/>

