<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="380" viewBox="0 0 300 380" version="1.1">

  <!-- Panel: 300x380px = 20HP x 3U - standard VCV dimensions -->
  <rect width="300" height="380" fill="#d8d6d0"/>
  <rect x="6" y="6" width="288" height="368" fill="#eceae4" rx="2"/>
  <line x1="6"   y1="6" x2="6"   y2="374" stroke="#ccc" stroke-width="1"/>
  <line x1="294" y1="6" x2="294" y2="374" stroke="#ccc" stroke-width="1"/>

  <!-- Mounting holes -->
