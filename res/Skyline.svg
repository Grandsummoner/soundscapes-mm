<svg xmlns="http://www.w3.org/2000/svg" width="60.96" height="380">

  <!-- Dark background -->
  <rect width="60.96" height="330" fill="#1a1a2e"/>

  <!-- White output area -->
  <rect y="330" width="60.96" height="50" fill="#ffffff"/>

  <!-- Brand: maybe -->
  <text x="30.48" y="14"
    font-family="Arial, sans-serif"
    font-size="10" font-weight="normal"
    fill="#FFC800"
    text-anchor="middle">maybe</text>

  <!-- Module title: SKYLINE -->
  <text x="30.48" y="26"
    font-family="Arial, sans-serif"
    font-size="8" font-weight="bold"
    fill="#FFC800"
    text-anchor="middle">SKYLINE</text>

  <!-- LEVEL label -->
  <text x="30.48" y="103"
    font-family="Arial, sans-serif"
    font-size="8" font-weight="bold"
    fill="#ffffff"
    text-anchor="middle">LEVEL</text>

  <!-- Knob placeholder circle -->
  <circle cx="30" cy="123" r="15"
    fill="none" stroke="#555555" stroke-width="1"/>

  <!-- AUDIO IN label -->
  <text x="15" y="180"
    font-family="Arial, sans-serif"
    font-size="8" font-weight="bold"
    fill="#ffffff"
    text-anchor="middle">AUDIO</text>

  <!-- CV IN label -->
  <text x="15" y="205"
    font-family="Arial, sans-serif"
    font-size="8" font-weight="bold"
    fill="#ffffff"
    text-anchor="middle">CV</text>

  <!-- GATE IN label -->
  <text x="15" y="230"
    font-family="Arial, sans-serif"
    font-size="8" font-weight="bold"
    fill="#ffffff"
    text-anchor="middle">GATE</text>

  <!-- Port placeholder circles (dark area) -->
  <circle cx="15" cy="200" r="12" fill="none" stroke="#555555" stroke-width="1"/>
  <circle cx="15" cy="225" r="12" fill="none" stroke="#555555" stroke-width="1"/>
  <circle cx="15" cy="250" r="12" fill="none" stroke="#555555" stroke-width="1"/>

  <!-- Output area labels (Type B, pink) -->
  <text x="15" y="334"
    font-family="Arial, sans-serif"
    font-size="7" font-weight="bold"
    fill="#FF8585"
    text-anchor="middle">AUDIO</text>

  <text x="45" y="334"
    font-family="Arial, sans-serif"
    font-size="7" font-weight="bold"
    fill="#FF8585"
    text-anchor="middle">CV</text>

  <text x="15" y="359"
    font-family="Arial, sans-serif"
    font-size="7" font-weight="bold"
    fill="#000000"
    text-anchor="middle">GATE</text>

  <!-- Port placeholder circles (white area) -->
  <circle cx="15" cy="343" r="12" fill="none" stroke="#aaaaaa" stroke-width="1"/>
  <circle cx="45" cy="343" r="12" fill="none" stroke="#aaaaaa" stroke-width="1"/>
  <circle cx="15" cy="368" r="12" fill="none" stroke="#aaaaaa" stroke-width="1"/>

</svg>
