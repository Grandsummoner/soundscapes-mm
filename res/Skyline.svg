  <circle cx="61.9"  cy="70" r="13" fill="#b8b5ae" stroke="#888" stroke-width="2"/><circle cx="61.9"  cy="70" r="8" fill="#111"/><circle cx="61.9"  cy="70" r="2.5" fill="#555"/>
  <circle cx="97.5"  cy="70" r="13" fill="#b8b5ae" stroke="#888" stroke-width="2"/><circle cx="97.5"  cy="70" r="8" fill="#111"/><circle cx="97.5"  cy="70" r="2.5" fill="#555"/>
  <circle cx="133.1" cy="70" r="13" fill="#b8b5ae" stroke="#888" stroke-width="2"/><circle cx="133.1" cy="70" r="8" fill="#111"/><circle cx="133.1" cy="70" r="2.5" fill="#555"/>
  <circle cx="168.8" cy="70" r="13" fill="#b8b5ae" stroke="#888" stroke-width="2"/><circle cx="168.8" cy="70" r="8" fill="#111"/><circle cx="168.8" cy="70" r="2.5" fill="#555"/>
