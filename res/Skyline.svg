  <text x="61.9"  y="67" text-anchor="middle" font-size="10" font-family="Arial" fill="#666">2</text>
  <text x="97.5"  y="67" text-anchor="middle" font-size="10" font-family="Arial" fill="#666">3</text>
  <text x="133.1" y="67" text-anchor="middle" font-size="10" font-family="Arial" fill="#666">4</text>
  <text x="168.8" y="67" text-anchor="middle" font-size="10" font-family="Arial" fill="#666">5</text>
