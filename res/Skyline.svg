  <circle cx="23.4" cy="119" r="13" fill="#b8b5ae" stroke="#888" stroke-width="2"/><circle cx="23.4" cy="119" r="8" fill="#111"/><circle cx="23.4" cy="119" r="2.5" fill="#555"/>

