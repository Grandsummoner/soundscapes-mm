  <text x="150" y="54" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#aaa" letter-spacing="3">8 CHANNEL CV SEQUENCER</text>
  <line x1="12" y1="60" x2="288" y2="60" stroke="#ccc" stroke-width="1"/>

