<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34" width="34" height="34">
  <!-- Subtle outer shadow -->
  <circle cx="17" cy="17" r="16.5" fill="#141414" />
  <!-- Main Knob Body -->
  <circle cx="17" cy="17" r="15" fill="#1f1f1f" stroke="#2e2e2e" stroke-width="1" />
  <!-- Inner Cap Shading -->
  <circle cx="17" cy="17" r="13" fill="#252525" />
  <!-- White Indicator Line pointing to 12 o'clock -->
  <line x1="17" y1="17" x2="17" y2="5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
</svg>
