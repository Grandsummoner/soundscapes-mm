<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 380" width="420" height="380">
  <defs>
    <!-- Smoked amber glass gradient for recessed 7-segment windows -->
    <linearGradient id="displayGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c110a" />
      <stop offset="100%" stop-color="#2a1b11" />
    </linearGradient>
    <!-- Soft inner shadows for recessed areas -->
    <filter id="insetShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="1" dy="1" />
      <feGaussianBlur stdDeviation="1.5" result="offset-blur" />
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse" />
      <feFlood flood-color="#000000" flood-opacity="0.4" result="color" />
      <feComposite operator="in" in="color" in2="inverse" result="shadow" />
      <feComposite operator="over" in="shadow" in2="SourceGraphic" />
    </filter>
  </defs>

  <!-- ========================================== -->
  <!-- 1. MAIN PANEL BACKGROUND & SIDEBARS       -->
  <!-- ========================================== -->
  <!-- Base Chassis: Vintage warm cream -->
  <rect x="0" y="0" width="420" height="380" fill="#f4eed6" stroke="#251a14" stroke-width="1.5" />

  <!-- Left Sidebar (Inputs): Sand/Taupe contrast band -->
  <rect x="0" y="0" width="45" height="380" fill="#e4daba" />
  <line x1="45" y1="0" x2="45" y2="380" stroke="#362a21" stroke-width="1.5" />

  <!-- Right Sidebar (Performance Buttons): Sand/Taupe contrast band -->
  <rect x="375" y="0" width="45" height="380" fill="#e4daba" />
  <line x1="375" y1="0" x2="375" y2="380" stroke="#362a21" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- ========================================== -->
  <!-- 2. BRANDING & GRAPHIC LINE LAYOUT         -->
  <!-- ========================================== -->
  <!-- Styled Logo Header -->
  <text x="210" y="32" font-family="sans-serif" font-weight="900" font-size="20" fill="#362a21" letter-spacing="4" text-anchor="middle">S O U N D S C A P E S</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#362a21" stroke-width="1" />

  <!-- Frame Dividers (Framing the Synth & Sequencer sections) -->
  <rect x="52" y="142" width="316" height="52" rx="3" fill="none" stroke="#362a21" stroke-width="0.75" />
  <rect x="52" y="202" width="316" height="170" rx="3" fill="none" stroke="#362a21" stroke-width="1" />

  <!-- ========================================== -->
  <!-- 3. LEFT COLUMN MARKINGS (I/O JACKS)       -->
  <!-- ========================================== -->
  <text x="22.5" y="24" font-family="sans-serif" font-weight="bold" font-size="10" fill="#362a21" text-anchor="middle" letter-spacing="1">IN</text>

  <!-- CLK Jack -->
  <circle cx="22.5" cy="55" r="13" fill="none" stroke="#362a21" stroke-width="0.75" />
  <text x="22.5" y="74" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">CLK</text>

  <!-- RST Jack -->
  <circle cx="22.5" cy="95" r="13" fill="none" stroke="#362a21" stroke-width="0.75" />
  <text x="22.5" y="114" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">RST</text>

  <!-- V/OCT Jack -->
  <circle cx="22.5" cy="135" r="13" fill="none" stroke="#362a21" stroke-width="0.75" />
  <text x="22.5" y="154" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">V/OCT</text>

  <!-- GATE Jack -->
  <circle cx="22.5" cy="175" r="13" fill="none" stroke="#362a21" stroke-width="0.75" />
  <text x="22.5" y="194" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">GATE</text>

  <!-- VEL Jack -->
  <circle cx="22.5" cy="215" r="13" fill="none" stroke="#362a21" stroke-width="0.75" />
  <text x="22.5" y="234" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">VEL</text>

  <!-- EXT IN Jack (Highlight boundary) -->
  <circle cx="22.5" cy="265" r="14" fill="none" stroke="#ffbf00" stroke-width="1.5" />
  <text x="22.5" y="286" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">EXT IN</text>

  <!-- DUCK Jack (Highlight boundary) -->
  <circle cx="22.5" cy="315" r="14" fill="none" stroke="#ff3b30" stroke-width="1.5" />
  <text x="22.5" y="336" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">DUCK</text>

  <!-- ========================================== -->
  <!-- 4. TOP OUTPUT JACKS & DISPLAYS (1 - 8)     -->
  <!-- ========================================== -->
  <!-- Column Channels 1 - 4 -->
  <g id="columns-left">
    <!-- Channel 1 -->
    <text x="70" y="80" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">1</text>
    <rect x="56" y="93" width="28" height="15" rx="3" fill="url(#displayGlass)" stroke="#362a21" stroke-width="1.25" filter="url(#insetShadow)" />
    <!-- Channel 2 -->
    <text x="105" y="80" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">2</text>
    <rect x="91" y="93" width="28" height="15" rx="3" fill="url(#displayGlass)" stroke="#362a21" stroke-width="1.25" filter="url(#insetShadow)" />
    <!-- Channel 3 -->
    <text x="140" y="80" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">3</text>
    <rect x="126" y="93" width="28" height="15" rx="3" fill="url(#displayGlass)" stroke="#362a21" stroke-width="1.25" filter="url(#insetShadow)" />
    <!-- Channel 4 -->
    <text x="175" y="80" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">4</text>
    <rect x="161" y="93" width="28" height="15" rx="3" fill="url(#displayGlass)" stroke="#362a21" stroke-width="1.25" filter="url(#insetShadow)" />
  </g>

  <!-- Column Channels 5 - 8 -->
  <g id="columns-right">
    <!-- Channel 5 -->
    <text x="280" y="80" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">5</text>
    <rect x="266" y="93" width="28" height="15" rx="3" fill="url(#displayGlass)" stroke="#362a21" stroke-width="1.25" filter="url(#insetShadow)" />
    <!-- Channel 6 -->
    <text x="315" y="80" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">6</text>
    <rect x="301" y="93" width="28" height="15" rx="3" fill="url(#displayGlass)" stroke="#362a21" stroke-width="1.25" filter="url(#insetShadow)" />
    <!-- Channel 7 -->
    <text x="350" y="80" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">7</text>
    <rect x="336" y="93" width="28" height="15" rx="3" fill="url(#displayGlass)" stroke="#362a21" stroke-width="1.25" filter="url(#insetShadow)" />
    <!-- Channel 8 -->
    <text x="385" y="80" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">8</text>
    <rect x="371" y="93" width="28" height="15" rx="3" fill="url(#displayGlass)" stroke="#362a21" stroke-width="1.25" filter="url(#insetShadow)" />
  </g>

  <!-- ========================================== -->
  <!-- 5. MID-PANEL SOUND & CONTROLS (ROW 3)      -->
  <!-- ========================================== -->
  <!-- Voice Mode Frame -->
  <rect x="58" y="148" width="24" height="40" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
  <text x="70" y="156" font-family="sans-serif" font-size="7" font-weight="bold" fill="#362a21" text-anchor="middle">V</text>
  <text x="70" y="170" font-family="sans-serif" font-size="7" font-weight="bold" fill="#362a21" text-anchor="middle" fill-opacity="0.4">W</text>
  <text x="70" y="184" font-family="sans-serif" font-size="7" font-weight="bold" fill="#362a21" text-anchor="middle" fill-opacity="0.4">D</text>

  <!-- FX Button Frames (Drawn as recessed vintage plate) -->
  <rect x="91" y="148" width="84" height="40" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
  <text x="112" y="160" font-family="sans-serif" font-weight="bold" font-size="7" fill="#362a21" text-anchor="middle">FM</text>
  <text x="154" y="160" font-family="sans-serif" font-weight="bold" font-size="7" fill="#362a21" text-anchor="middle">DELAY</text>
  <text x="112" y="181" font-family="sans-serif" font-weight="bold" font-size="7" fill="#362a21" text-anchor="middle">REVERB</text>
  <text x="154" y="181" font-family="sans-serif" font-weight="bold" font-size="7" fill="#362a21" text-anchor="middle">FILTER</text>

  <!-- 6 Control Knobs (Text Markings perfectly aligned to columns) -->
  <g id="synth-knobs">
    <!-- RATE Knob -->
    <text x="195" y="188" font-family="sans-serif" font-weight="bold" font-size="6.5" fill="#362a21" text-anchor="middle">RATE</text>
    <!-- DENSITY Knob -->
    <text x="230" y="188" font-family="sans-serif" font-weight="bold" font-size="6.5" fill="#362a21" text-anchor="middle">DENSITY</text>
    <!-- TIMBRE Knob -->
    <text x="265" y="188" font-family="sans-serif" font-weight="bold" font-size="6.5" fill="#362a21" text-anchor="middle">TIMBRE</text>
    <!-- TEXTURE Knob -->
    <text x="300" y="188" font-family="sans-serif" font-weight="bold" font-size="6.5" fill="#362a21" text-anchor="middle">TEXTURE</text>
    <!-- SPREAD Knob -->
    <text x="335" y="188" font-family="sans-serif" font-weight="bold" font-size="6.5" fill="#362a21" text-anchor="middle">SPREAD</text>
    <!-- DYNAMICS Knob -->
    <text x="370" y="188" font-family="sans-serif" font-weight="bold" font-size="6.5" fill="#362a21" text-anchor="middle">DYNAMICS</text>
  </g>

  <!-- ========================================== -->
  <!-- 6. FADERS & MIDDLE KNOBS ROW              -->
  <!-- ========================================== -->
  <!-- Fader Slot Cutouts & Markings (Left Side) -->
  <g id="fader-slots-left">
    <!-- Fader 1 -->
    <line x1="70" y1="210" x2="70" y2="260" stroke="#362a21" stroke-width="1.5" stroke-linecap="round" />
    <text x="70" y="270" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">1</text>
    <!-- Fader 2 -->
    <line x1="105" y1="210" x2="105" y2="260" stroke="#362a21" stroke-width="1.5" stroke-linecap="round" />
    <text x="105" y="270" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">2</text>
    <!-- Fader 3 -->
    <line x1="140" y1="210" x2="140" y2="260" stroke="#362a21" stroke-width="1.5" stroke-linecap="round" />
    <text x="140" y="270" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">3</text>
    <!-- Fader 4 -->
    <line x1="175" y1="210" x2="175" y2="260" stroke="#362a21" stroke-width="1.5" stroke-linecap="round" />
    <text x="175" y="270" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">4</text>
  </g>

  <!-- Center Discrete Adjusters (ROOT & SCALE) -->
  <g id="center-controllers">
    <!-- ROOT Knob -->
    <circle cx="210" cy="232" r="14" fill="none" stroke="#362a21" stroke-width="0.75" />
    <text x="210" y="255" font-family="sans-serif" font-weight="bold" font-size="7" fill="#362a21" text-anchor="middle">ROOT</text>
    <!-- SCALE Knob -->
    <circle cx="245" cy="232" r="14" fill="none" stroke="#362a21" stroke-width="0.75" />
    <text x="245" y="255" font-family="sans-serif" font-weight="bold" font-size="7" fill="#362a21" text-anchor="middle">SCALE</text>
  </g>

  <!-- Fader Slot Cutouts & Markings (Right Side) -->
  <g id="fader-slots-right">
    <!-- Fader 5 -->
    <line x1="280" y1="210" x2="280" y2="260" stroke="#362a21" stroke-width="1.5" stroke-linecap="round" />
    <text x="280" y="270" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">5</text>
    <!-- Fader 6 -->
    <line x1="315" y1="210" x2="315" y2="260" stroke="#362a21" stroke-width="1.5" stroke-linecap="round" />
    <text x="315" y="270" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">6</text>
    <!-- Fader 7 -->
    <line x1="350" y1="210" x2="350" y2="260" stroke="#362a21" stroke-width="1.5" stroke-linecap="round" />
    <text x="350" y="270" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">7</text>
    <!-- Fader 8 -->
    <line x1="385" y1="210" x2="385" y2="260" stroke="#362a21" stroke-width="1.5" stroke-linecap="round" />
    <text x="385" y="270" font-family="sans-serif" font-weight="bold" font-size="8" fill="#362a21" text-anchor="middle">8</text>
  </g>

  <!-- ========================================== -->
  <!-- 7. SEQUENCER PAD FRAMES                   -->
  <!-- ========================================== -->
  <!-- Row 1: Melody (recessed frames where step buttons sit) -->
  <g id="melody-pads">
    <text x="56" y="291" font-family="sans-serif" font-size="6" font-weight="bold" fill="#362a21">MELODY</text>
    <rect x="56" y="294" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="91" y="294" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="126" y="294" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="161" y="294" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="266" y="294" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="301" y="294" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="336" y="294" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="371" y="294" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
  </g>

  <!-- Row 2: Chord (recessed frames where step buttons sit) -->
  <g id="chord-pads">
    <text x="56" y="333" font-family="sans-serif" font-size="6" font-weight="bold" fill="#362a21">CHORD</text>
    <rect x="56" y="336" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="91" y="336" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="126" y="336" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="161" y="336" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="266" y="336" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="301" y="336" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="336" y="336" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
    <rect x="371" y="336" width="28" height="24" rx="3" fill="#ebdcb9" stroke="#362a21" stroke-width="0.75" />
  </g>

  <!-- ========================================== -->
  <!-- 8. RIGHT COLUMN PERFORMANCE BUTTON MARKINGS-->
  <!-- ========================================== -->
  <g id="right-column-buttons" font-family="sans-serif" font-weight="bold" font-size="7">
    <!-- Col 1 labels -->
    <text x="390" y="44" fill="#2d6e35" text-anchor="middle">PLAY</text>
    <text x="390" y="112" fill="#0066b2" text-anchor="middle">ARP</text>
    <text x="390" y="180" fill="#7522a1" text-anchor="middle">CHRD</text>
    <text x="390" y="248" fill="#d95d12" text-anchor="middle">SAVE</text>

    <!-- Col 2 labels -->
    <text x="408" y="44" fill="#a88c00" text-anchor="middle">SHFT</text>
    <text x="408" y="112" fill="#0066b2" text-anchor="middle">FRZ</text>
    <text x="408" y="180" fill="#7522a1" text-anchor="middle">PROB</text>
    <text x="408" y="248" fill="#d95d12" text-anchor="middle">RCL</text>
  </g>

  <!-- ========================================== -->
  <!-- 9. STANDARD EURORACK PANEL MOUNTING SCREWS -->
  <!-- ========================================== -->
  <g id="chassis-screws" fill="#8c8279" stroke="#362a21" stroke-width="0.5">
    <!-- Top Left -->
    <circle cx="7.5" cy="7.5" r="3" />
    <line x1="5.5" y1="7.5" x2="9.5" y2="7.5" />
    <!-- Top Right -->
    <circle cx="412.5" cy="7.5" r="3" />
    <line x1="410.5" y1="7.5" x2="414.5" y2="7.5" />
    <!-- Bottom Left -->
    <circle cx="7.5" cy="372.5" r="3" />
    <line x1="5.5" y1="372.5" x2="9.5" y2="372.5" />
    <!-- Bottom Right -->
    <circle cx="412.5" cy="372.5" r="3" />
    <line x1="410.5" y1="372.5" x2="414.5" y2="372.5" />
  </g>
</svg>
