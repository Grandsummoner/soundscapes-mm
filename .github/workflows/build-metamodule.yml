name: Build MetaModule Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      SDK_branch:
        description: 'MetaModule SDK branch to target'
        required: true
        type: choice
        default: main
        options:
          - main

jobs:
  build-arm:
    name: metamodule-arm-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Plugin Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Tools and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 jq wget tar

      - name: Install Supported ARM GNU Toolchain (v12.3)
        run: |
          mkdir -p $HOME/toolchain
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/12.3.rel1/binrel/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz -O $HOME/toolchain/arm-gnu-toolchain.tar.xz
          tar -xf $HOME/toolchain/arm-gnu-toolchain.tar.xz -C $HOME/toolchain
          # Add the precise toolchain bin folder to the GitHub action runner's path
          echo "$HOME/toolchain/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

      - name: Checkout MetaModule SDK
        uses: actions/checkout@v4
        with:
          repository: 4ms/metamodule-plugin-sdk
          ref: ${{ github.event.inputs.SDK_branch || 'main' }}
          path: metamodule-plugin-sdk
          submodules: recursive

      - name: Build ARM mmplugin
        run: |
          mkdir -p build
          cmake -B build -G Ninja \
            -DMETAMODULE_SDK_DIR=${{ github.workspace }}/metamodule-plugin-sdk \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Upload MetaModule Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundscapes-mm-hardware-plugin
          path: build/*.mmplugin
