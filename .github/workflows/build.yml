name: Build VCV Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Rack SDK (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          curl -sLo rack-sdk.zip https://vcvrack.com/downloads/Rack-SDK-2.6.0-lin-x64.zip
          unzip -q rack-sdk.zip
          mv Rack-SDK rack-sdk

      - name: Get Rack SDK (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sLo rack-sdk.zip https://vcvrack.com/downloads/Rack-SDK-2.6.0-win-x64.zip
          unzip -q rack-sdk.zip
          mv Rack-SDK rack-sdk

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          export RACK_DIR=${{ github.workspace }}/rack-sdk
          make

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export RACK_DIR=${{ github.workspace }}/rack-sdk
          make

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.os }}
          path: dist/
